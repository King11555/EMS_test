#################################################################
#                     MODBUS DEVICES                            #
#################################################################
MODBUS_DEVICES:
  A:
    type: tcp
    ip: 192.168.1.113
    port: 502
    slave_id: 3       # Logger elektrane + baterije (HUAWEI)
    word_order: big

  B:
    type: tcp
    ip: 192.168.0.3
    port: 502
    slave_id: 4          # Energy meter na loggeru
    word_order: big

  C:                    #Senzor ozračenosti istok
    type: rtu
    port: /dev/ttyUSB0
    baudrate: 9600
    parity: N
    stopbits: 1
    bytesize: 8
    slave_id: 1
    word_order: big

  D:                  #Senzor ozračenosti zapad
    type: rtu
    port: /dev/ttyUSB0
    baudrate: 9600
    parity: N
    stopbits: 1
    bytesize: 8
    slave_id: 1   
    word_order: big       



