<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modbus testno sučelje</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <h1>EMS modbus testno sučelje 1.0</h1>

<div class="prvi_podaci">
  <div class="left-side">
    <h3>Trenutno vrijeme</h3>
    <div id="ntpClockTemp" class="status-box">
      <span id="ntpClock">Učitavanje...</span><br>
    </div>
  </div>
 </div> 

<!-- MODAL ZA ručni UPIS-->

<div id="registers" class="registers-grid" style="display:grid; grid-template-columns: 250px 120px 80px 1fr; gap:10px; align-items:center;"></div><br>
<div id="writeRegisters" class="registers-grid" style="display:grid; grid-template-columns: 250px 120px 80px 1fr; gap:10px; align-items:center;"></div>

<div id="outputWindow"
     style="background:#111; color:#0f0; padding:10px; margin-top:10px; font-family:monospace;">
</div>

<script>
    
    //kompletna mapa s backenda na frontend
        const backend_map ={
            "M_probni_a": {value: 0},
            "M_probni_b": {value: 0}, 
            "M_probni_c": {value: 0}      
      
        };
    

//ONO ŠTO ŽELIM PRIKAZIVATI NA MONITOR EKRANU
        const SCADA_MAP = {
            "M_probni_a": {label: "Struja L1: ", unit: "A", value:0},
            "M_probni_b": {label: "Uzemljivač u susretnom postrojenju:", unit:"1: uzemljen, 0: otvoren", value:0},
            "M_probni_c": {label: "Prisutstvo napona u susretnom postrojenju:", unit:"1: prisutan, 0: nema napona", value:0}
        };

for (const key in SCADA_MAP) {
    if (backend_map.hasOwnProperty(key)) {
        // kopiraj vrijednosti atributa u scada_mapu
        SCADA_MAP[key].value = backend_map[key].value;
    }
}

let writeRegistersList=[];

function loadWriteRegisters() {
    fetch("/api/write_registers", { cache: "no-store" })
        .then(res => res.json())
        .then(data => {
            writeRegistersList = data;
            writeRegistersList.forEach(createWriteRegisterRow);
        })
        .catch(err => console.error("Failed to load write registers:", err));
}

//...............Osvježavanje prozora za podatke........................

function updateRegistersDisplay() {
  const container = document.getElementById('registers');
  container.innerHTML = "";

  for (const key in SCADA_MAP) {
    const reg = SCADA_MAP[key];

    // Create the same grid layout as writeRegisters
    const descDiv = document.createElement("div");
    descDiv.textContent = reg.label;
    descDiv.style.fontWeight = "500";

    const valueDiv = document.createElement("div");
    valueDiv.textContent = reg.value;

    const unitDiv = document.createElement("div");
    unitDiv.textContent = reg.unit;
    unitDiv.style.color = "gray";

    const spacerDiv = document.createElement("div"); // empty placeholder for 4th column

    // Append children in order
    container.appendChild(descDiv);
    container.appendChild(valueDiv);
    container.appendChild(unitDiv);
    container.appendChild(spacerDiv);
  }
}


//...............Dohvat podataka s backenda........................

function fetchAndUpdateValues() {
    fetch('/Frontend_primi_podatke', { cache: "no-store" })
        .then(res => res.json())
        .then(data => {
            // Update backend mape
            for (const key in data) {
                if (backend_map[key] && data[key] && typeof data[key].value !== "undefined") {
                    backend_map[key].value = data[key].value;
                }
            }

            // kopiranje u SCADA mapu za prikaz vrijednosti
            for (const key in SCADA_MAP) {
                if (backend_map[key]) {
                    SCADA_MAP[key].value = safeToFixedclassic(backend_map[key].value, 2);
                }
            }

            // Osvježavanje prikaza nakon update SCADA-mape
            updateRegistersDisplay();
        })
        .catch(err => console.error("Error fetching values:", err));
    }
//...............Periodičko slanje na backend........................

function SendAndUpdateValues() {
    
const dataToSend = {
    "M_REGISTAR1_TEST1": { value: backend_map["M_REGISTAR1_TEST1"].value }
    };

    fetch('/Frontend_salji_podatke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dataToSend)
    })
    .then(res => res.json())
    .then(data => {
        
    })
    .catch(err => console.error(err));
}

//...............formatiranje zapisa........................

function safeToFixedclassic(value, decimals = 2) {
    const num = Number(value);
    return !isNaN(num) ? num.toFixed(decimals) : "0.00";
    }


//...............Render prozora za upis podataka........................
    
function createWriteRegisterRow(register) {
    
    const container = document.getElementById("writeRegisters");

    const descDiv = document.createElement("div");
    descDiv.textContent = register.description;
    descDiv.style.fontWeight = "500";

    const inputEl = document.createElement("input");
    inputEl.type = "number";
    inputEl.id = `writeValue-${register.id}-${register.client}`;
    inputEl.placeholder = "Vrijednost";
    inputEl.style.width = "100px";

    const buttonEl = document.createElement("button");
    buttonEl.textContent = "Upiši";
    buttonEl.onclick = () => manualWriteRegister(register.id, register.client);

    const explDiv = document.createElement("div");
    explDiv.textContent = register.explanation;
    explDiv.style.fontSize = "0.8em";
    explDiv.style.color = "gray";

    container.appendChild(descDiv);
    container.appendChild(inputEl);
    container.appendChild(buttonEl);
    container.appendChild(explDiv);
}

//Funkcija za pisanje podataka 
function manualWriteRegister(registerId, client) {
    const inputEl = document.getElementById(`writeValue-${registerId}-${client}`);
    const value = inputEl.value;
    
    if (value === "") { 
        alert("Molimo unesite vrijednost!"); 
        return; 
    }

    // Find the selected register based on registerId and client
    const selectedRegister = writeRegistersList.find(register => register.id === registerId && register.client === client);
    
    if (!selectedRegister) {
        alert("Ne postoji registracija za odabrani ID i klijent!");
        return;
    }
    const calculatedValue = value * selectedRegister.gain;

    // Now perform the fetch request using the selected register's details
    fetch('/write', {   
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            address: selectedRegister.id,     // Correctly using the selected register
            value: calculatedValue,                     // The value from the input field
            client: selectedRegister.client,
            bit_size: selectedRegister.bit_size
        })
    })
    .then(res => res.json())
    .then(data => {
        const outputWindow = document.getElementById("outputWindow");
        const timestamp = new Date().toLocaleTimeString('hr-HR', { hour12: false });
        const messageDiv = document.createElement("div");
        messageDiv.textContent = `[${timestamp}] ${JSON.stringify(data)}`;
        messageDiv.style.color = "#00ff99";
        outputWindow.appendChild(messageDiv);

        if (outputWindow.children.length > 5) {
            outputWindow.removeChild(outputWindow.firstChild);
        }

        inputEl.value = "";
    })
    .catch(err => {
        alert("Greška pri komunikaciji sa serverom!");
        console.error(err);
    });
}


function updateLocalClock() {
        const now = new Date();
        document.getElementById("ntpClock").textContent = 
        now.toLocaleTimeString('hr-HR', { hour12: false });
        }


function sendManualValue() {

        SendAndUpdateValues();
       
    }



// ---------------- Hook into glavni_program ----------------
function glavni_program() {
    updateLocalClock();
    fetchAndUpdateValues();

        //update setpointa enna 
        
        //const ENNA_setpoint_scada = document.getElementById("ENNA_setpoint_scada"); 
        //const ENNA_setpoint_scada_instanca=backend_map["M_ENNA_podesena_snaga"].value; //INSTANCE su ako ima više otvorenih prozora odjedanput, da se refresha backend sukladno zadnjem upisu

        //ENNA_setpoint_scada.textContent = ENNA_setpoint_scada_instanca + ' kW'; //ručni automatski upis -resfresh instanca 

}

// ---------------- On page load ----------------
window.onload = function() {

    fetchAndUpdateValues();   // initial fetch
    loadWriteRegisters(); 
    SendAndUpdateValues(); // initial send to backend
};

// Run main program every second
setInterval(glavni_program, 1000);

    
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

</body>
</html>
